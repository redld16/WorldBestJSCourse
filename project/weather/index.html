<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <form class="formDiv" >
        <div class="inpDiv">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Enter City Name" class="" id="inp" />
          <!-- <input type="text" placeholder="Enter City ZipCode" class="hidden" id="zipCode"/> -->
        </div>
        <button class="btnSearch" type="submit">Search</button>
      </form>
      <div class="details">
        <h2 class="cityName"></h2>
        <p class="date">Date</p>
        <div class="live">Weather</div>
        <div class="icon"></div>
        <p class="temperature">Temperature</p>
        <div class="minMaxDiv">
          <p class="minTemp">Min</p>
          <p class="maxTemp">Max</p>
        </div>
      </div>
      <div class="weatherDetails">
        <div class="divs">
          <i class="fa-solid fa-temperature-three-quarters"></i>
          <div>
            <p>Feels Like</p>
            <p class="feelsLike"><span>15&#176;</span></p>
          </div>
        </div>
        <div class="divs">
          <i class="fa-solid fa-droplet"></i>
          <div>
            <p>Humidity</p>
            <p class="humidity"><span>68&#37;</span></p>
          </div>
        </div>
        <div class="divs">
          <i class="fa-solid fa-wind"></i>
          <div>
            <p>Wind</p>
            <p class="wind"><span>10 km/h</span></p>
          </div>
        </div>
        <div class="divs">
          <i class="fa-solid fa-gauge-high"></i>
          <div>
            <p>Pressure</p>
            <p class="pressure"><span>1012 hPa</span></p>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
