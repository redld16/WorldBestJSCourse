<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      #inputField {
        width: 200px;
        padding: 5px;
        font-size: 16px;
        margin: 10px;
        margin-left: 0;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Simple DOM Todo App</h1>
      <input type="text" id="inputField" />
      <button class="btn">click me</button>
      <div class="todoListsElem"></div>
    </div>

    <script>
      let inputElem = document.getElementById("inputField");
      let clickBtn = document.querySelector(".btn");
      let todoElem = document.querySelector(".todoListsElem");

      const addTodo = () => {
        if (inputElem.value.trim() === "") return; // Prevent empty todos

        // Create NEW elements for each todo
        let pElem = document.createElement("p");
        let delBtn = document.createElement("button");

        pElem.textContent = inputElem.value;
        delBtn.textContent = "delete";
        delBtn.style.marginLeft = "20px";

        // Add delete functionality
        delBtn.addEventListener("click", (event) => {
          event.target.parentElement.remove();
        });

        pElem.append(delBtn);
        todoElem.append(pElem);
        inputElem.value = "";
      };

      clickBtn.addEventListener("click", () => {
        addTodo();
      });

      // Optional: Add todo on Enter key press
      inputElem.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addTodo();
      });
    </script>
  </body>
</html>
